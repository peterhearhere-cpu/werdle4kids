<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werdle 4 Kids! ✨</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #FFF9E6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* Header & Music Toggle */
        .header-bar { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 400px; 
            margin-bottom: 10px; 
            gap: 8px;
        }
        h1 { 
            color: #FF6B6B; 
            font-size: 1.8rem; 
            text-shadow: 2px 2px #FFD93D; 
            margin: 0; 
            text-align: center; 
            line-height: 1.2;
        }
        #music-btn {
            background-color: #4D96FF; color: white; border: none; border-radius: 8px;
            padding: 6px 12px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #3578E5;
            font-size: 0.9rem;
        }
        #music-btn:active { transform: translateY(2px); box-shadow: 0 1px #3578E5; }
        
        /* Board Layout */
        .board-container {
            max-height: 25vh; overflow-y: auto; margin-bottom: 5px;
            padding: 5px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: auto; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tile {
            width: 50px; height: 50px; border: 3px solid #4D96FF; border-radius: 12px;
            background-color: white; font-size: 1.8rem; font-weight: bold; color: #333;
            display: flex; align-items: center; justify-content: center; text-transform: uppercase;
        }
        .correct { background-color: #6BCB77 !important; color: white; border-color: #55b061; transform: scale(1.05); }
        .present { background-color: #FFD93D !important; color: white; border-color: #e6c230; }
        .absent { background-color: #D3D3D3 !important; color: #777; border-color: #b5b5b5; text-decoration: line-through; }
        
        /* Keyboard */
        .keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 400px; padding: 5px; }
        .kbd-row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        .key {
            flex: 1; padding: 12px 0; background-color: #4D96FF; color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px #3578E5;
            text-align: center; -webkit-tap-highlight-color: transparent;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 2px #3578E5; }
        .wide-key { flex: 1.5; background-color: #FF6B6B; box-shadow: 0 4px #E55353; font-size: 0.9rem; }
        
        /* Alphabet Tracker */
        .abc-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;
            max-width: 400px; margin-top: 5px; background: rgba(255,255,255,0.6);
            padding: 8px; border-radius: 10px;
        }
        .abc-letter {
            width: 23px; height: 23px; border-radius: 4px; background: #FFF; border: 1.5px solid #4D96FF;
            font-size: 0.85rem; font-weight: bold; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; color: #4D96FF;
        }

        /* FULL VIEW Word Bank */
        .word-bank-wrapper { max-width: 450px; margin-top: 15px; width: 100%; padding-bottom: 20px; }
        .word-bank-wrapper h3 { text-align: center; color: #4D96FF; margin: 0 0 10px 0; font-size: 1.2rem; }
        .word-bank {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 4px;
            background: white; border: 3px dashed #FFD93D; border-radius: 15px;
            padding: 8px; 
            height: auto; 
            box-sizing: border-box;
        }
        .word-item {
            font-size: 0.75rem; font-weight: bold; background: #FFF9E6; color: #333;
            padding: 4px 2px; border-radius: 6px; border: 1px solid #FFD93D;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }
        
        /* The specific CSS fix to properly cross out flexbox items */
        .word-item.found {
            opacity: 0.4;
            background: #e0e0e0; border-color: #b5b5b5;
        }
        .word-item.found .word-text {
            text-decoration: line-through;
            color: #FF6B6B; /* Turns the struck-through text red to make it obvious */
        }

        /* Celebration Screen */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10;
        }
        .pop-card {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 5px solid #FFD93D; max-width: 80%;
        }
        .pop-card h2 { color: #6BCB77; font-size: 2.5rem; margin: 0 0 10px 0; }
        .pop-card .big-emoji { font-size: 5rem; margin: 15px 0; animation: bounce 0.6s infinite alternate; }
        .btn-next {
            padding: 12px 25px; font-size: 1.3rem; font-weight: bold; background: #FF6B6B;
            color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #E55353;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>✨Wordle 4 Autumn & Layla✨</h1>
        <button id="music-btn" onclick="toggleMusic()">🎵 Music: OFF</button>
    </div>
    
    <div class="board-container">
        <div class="grid" id="board"></div>
    </div>

    <div class="keyboard">
        <div class="kbd-row">
            <button class="key" onclick="press('q')">q</button><button class="key" onclick="press('w')">w</button><button class="key" onclick="press('e')">e</button><button class="key" onclick="press('r')">r</button><button class="key" onclick="press('t')">t</button><button class="key" onclick="press('y')">y</button><button class="key" onclick="press('u')">u</button><button class="key" onclick="press('i')">i</button><button class="key" onclick="press('o')">o</button><button class="key" onclick="press('p')">p</button>
        </div>
        <div class="kbd-row">
            <button class="key" onclick="press('a')">a</button><button class="key" onclick="press('s')">s</button><button class="key" onclick="press('d')">d</button><button class="key" onclick="press('f')">f</button><button class="key" onclick="press('g')">g</button><button class="key" onclick="press('h')">h</button><button class="key" onclick="press('j')">j</button><button class="key" onclick="press('k')">k</button><button class="key" onclick="press('l')">l</button>
        </div>
        <div class="kbd-row">
            <button class="key wide-key" onclick="press('ENTER')">GO!</button>
            <button class="key" onclick="press('z')">z</button><button class="key" onclick="press('x')">x</button><button class="key" onclick="press('c')">c</button><button class="key" onclick="press('v')">v</button><button class="key" onclick="press('b')">b</button><button class="key" onclick="press('n')">n</button><button class="key" onclick="press('m')">m</button>
            <button class="key wide-key" onclick="press('BACK')">⌫</button>
        </div>
    </div>

    <div class="abc-container" id="abc-tracker"></div>
    
    <!-- Expanded Word Bank Display -->
    <div class="word-bank-wrapper">
        <h3>Words to find! 🔍</h3>
        <div class="word-bank" id="word-bank-list"></div>
    </div>

    <!-- Celebration Screen -->
    <div id="win-overlay">
        <div class="pop-card">
            <h2>Hooray! 🎉</h2>
            <div id="word-reveal" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 5px;"></div>
            <div id="attempt-counter" style="font-size: 1.2rem; color: #4D96FF; font-weight: bold;"></div>
            <div class="big-emoji" id="win-emoji">🐱</div>
            <button class="btn-next" onclick="resetGame()">Play Again! 🌟</button>
        </div>
    </div>

    <script>
        const WORDS = [
            { word: "ant", emoji: "🐜" }, { word: "ape", emoji: "🦍" }, { word: "bag", emoji: "🎒" },
            { word: "bat", emoji: "🦇" }, { word: "bed", emoji: "🛏️" }, { word: "bee", emoji: "🐝" },
            { word: "boa", emoji: "🐍" }, { word: "boo", emoji: "👻" }, { word: "bow", emoji: "🎀" }, 
            { word: "box", emoji: "📦" }, { word: "bug", emoji: "🐛" }, { word: "bum", emoji: "🍑" }, 
            { word: "bun", emoji: "🥯" }, { word: "bus", emoji: "🚌" }, { word: "can", emoji: "🥫" }, 
            { word: "car", emoji: "🚗" }, { word: "cat", emoji: "🐱" }, { word: "cog", emoji: "⚙️" }, 
            { word: "cow", emoji: "🐮" }, { word: "cup", emoji: "🥤" }, { word: "dog", emoji: "🐶" }, 
            { word: "egg", emoji: "🥚" }, { word: "fan", emoji: "🪭" }, { word: "fly", emoji: "🪰" }, 
            { word: "fox", emoji: "🦊" }, { word: "gem", emoji: "💎" }, { word: "hat", emoji: "🎩" }, 
            { word: "hen", emoji: "🐔" }, { word: "ice", emoji: "🧊" }, { word: "jam", emoji: "🍓" }, 
            { word: "jar", emoji: "🫙" }, { word: "jet", emoji: "🛩️" }, { word: "key", emoji: "🔑" }, 
            { word: "lip", emoji: "👄" }, { word: "log", emoji: "🪵" }, { word: "map", emoji: "🗺️" }, 
            { word: "mop", emoji: "🧹" }, { word: "mug", emoji: "🍺" }, { word: "net", emoji: "🕸️" }, 
            { word: "nut", emoji: "🥜" }, { word: "owl", emoji: "🦉" }, { word: "pea", emoji: "🫛" }, 
            { word: "pen", emoji: "🖊️" }, { word: "pig", emoji: "🐷" }, { word: "pin", emoji: "📌" }, 
            { word: "poo", emoji: "💩" }, { word: "pot", emoji: "🪴" }, { word: "red", emoji: "🔴" }, 
            { word: "rug", emoji: "🧺" }, { word: "sea", emoji: "🌊" }, { word: "see", emoji: "👁️" }, 
            { word: "sit", emoji: "🪑" }, { word: "sky", emoji: "☁️" }, { word: "sub", emoji: "🚢" }, 
            { word: "sun", emoji: "☀️" }, { word: "tag", emoji: "🏷️" }, { word: "toy", emoji: "🧸" }, 
            { word: "try", emoji: "🙂" }, { word: "web", emoji: "🕸️" }, { word: "wee", emoji: "🚽" }
        ];
        
        let targetWord, targetEmoji, currentRow, currentTile, gameOver;
        let totalAttempts = 0;
        let currentGuess = "";
        let remainingWords = [];
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        
        // --- Dual-Voice Web Audio Engine ---
        let audioCtx = null;
        function playNote(freq, type, duration, vol = 0.1) {
            if (!freq) return; 
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = type; 
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime + (duration * 0.8), 0.05);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playWinMelody() {
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, index) => {
                setTimeout(() => playNote(freq, 'square', 0.2, 0.15), index * 100);
            });
        }

        // --- Amiga Tracker Module ---
        let bgmInterval;
        let bgmPlaying = false;
        
        const n = { 
            C2: 65.41, Eb2: 77.78, F2: 87.31, G2: 98.00, Bb2: 116.54, 
            C3: 130.81, D3: 146.83, Eb3: 155.56, G3: 196.00,
            C4: 261.63, D4: 293.66, Eb4: 311.13, F4: 349.23, G4: 392.00
        };

        const amigaSequence = [
            [null, n.C2, 4], [null, n.C3, 4], [null, n.G2, 4], [null, n.Eb2, 4],
            [n.G4, n.C2, 4], [null, n.C3, 4], [null, n.G2, 4], [null, n.Eb2, 4],
            [n.F4, n.F2, 2], [n.D4, n.F2, 2], [null, n.F3, 4], [null, n.C3, 4], [null, n.G2, 4],
            [n.C4, n.C2, 2], [n.D4, n.C2, 2], [n.Eb4, n.C3, 4], [null, n.G2, 4], [null, n.Eb2, 4],
            [n.D4, n.Bb2, 4], [null, n.Bb3, 4], [n.C4, n.F2, 4], [null, n.F3, 4],
            [n.C4, n.C2, 8], [null, n.C3, 4], [null, n.G2, 4]
        ];
        
        let noteIdx = 0;
        let beatLength = 110; 

        function stepBGM() {
            if (!bgmPlaying) return;
            let [melody, bass, ticks] = amigaSequence[noteIdx];
            
            if (melody) playNote(melody, 'square', (ticks * beatLength)/1000, 0.04); 
            if (bass) playNote(bass, 'sawtooth', (ticks * beatLength)/1000, 0.08);
            
            noteIdx = (noteIdx + 1) % amigaSequence.length;
            bgmInterval = setTimeout(stepBGM, ticks * beatLength);
        }

        function toggleMusic() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            bgmPlaying = !bgmPlaying;
            document.getElementById('music-btn').innerText = bgmPlaying ? "🎵 Music: ON" : "🎵 Music: OFF";
            
            if (bgmPlaying) {
                noteIdx = 0;
                stepBGM();
            } else {
                clearTimeout(bgmInterval);
            }
        }

        // --- Word Bank Setup ---
        function setupWordBank() {
            const wordBank = document.getElementById('word-bank-list');
            wordBank.innerHTML = '';
            WORDS.sort((a, b) => a.word.localeCompare(b.word));
            
            WORDS.forEach(obj => {
                let div = document.createElement('div');
                div.className = 'word-item';
                div.id = `wb-${obj.word.toLowerCase()}`;
                // Added a specific class "word-text" to the span so we can cross it out cleanly
                div.innerHTML = `<span style="font-size: 1.2rem; margin-bottom: 2px;">${obj.emoji}</span><span class="word-text">${obj.word}</span>`;
                wordBank.appendChild(div);
            });
            remainingWords = [...WORDS];
        }

        // --- Game Logic ---
        function initGame() {
            document.getElementById('board').innerHTML = '';
            currentRow = 0; currentTile = 0; totalAttempts = 0;
            currentGuess = ""; gameOver = false;
            document.getElementById('win-overlay').style.display = 'none';
            
            if (remainingWords.length === 0) {
                setupWordBank();
            }
            
            let randomIndex = Math.floor(Math.random() * remainingWords.length);
            let picked = remainingWords.splice(randomIndex, 1)[0];
            
            targetWord = picked.word.toLowerCase();
            targetEmoji = picked.emoji;
            
            addNewRow();
            
            const tracker = document.getElementById('abc-tracker');
            tracker.innerHTML = '';
            alphabet.forEach(letter => {
                let node = document.createElement('div');
                node.className = 'abc-letter';
                node.id = `abc-${letter}`;
                node.innerText = letter;
                tracker.appendChild(node);
            });
        }

        function addNewRow() {
            const board = document.getElementById('board');
            let row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${currentRow}`;
            for (let j = 0; j < 3; j++) {
                let tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${currentRow}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
            
            const container = document.querySelector('.board-container');
            container.scrollTop = container.scrollHeight;
        }

        function press(key) {
            if (gameOver) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            if (key === 'BACK') {
                playNote(220, 'square', 0.1, 0.05); 
                if (currentTile > 0) {
                    currentTile--;
                    currentGuess = currentGuess.slice(0, -1);
                    document.getElementById(`tile-${currentRow}-${currentTile}`).innerText = '';
                }
            } else if (key === 'ENTER') {
                if (currentGuess.length === 3) {
                    checkRow();
                } else {
                    playNote(150, 'sawtooth', 0.15, 0.1);
                }
            } else if (/^[a-z]$/i.test(key)) {
                if (currentTile < 3) {
                    const letterPitches = [440, 523, 659];
                    playNote(letterPitches[currentTile], 'square', 0.1, 0.05);
                    
                    currentGuess += key.toLowerCase();
                    document.getElementById(`tile-${currentRow}-${currentTile}`).innerText = key;
                    currentTile++;
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') press('ENTER');
            else if (e.key === 'Backspace') press('BACK');
            else if (/^[a-zA-Z]$/.test(e.key)) press(e.key.toLowerCase());
        });

        function checkRow() {
            let rightCount = 0;
            totalAttempts++;
            
            for (let i = 0; i < 3; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                let letter = currentGuess[i];
                let abcNode = document.getElementById(`abc-${letter}`);
                
                if (targetWord[i] === letter) {
                    tile.classList.add('correct');
                    if (abcNode) { abcNode.className = 'abc-letter correct'; }
                    rightCount++;
                } else if (targetWord.includes(letter)) {
                    tile.classList.add('present');
                    if (abcNode && !abcNode.classList.contains('correct')) {
                        abcNode.className = 'abc-letter present';
                    }
                } else {
                    tile.classList.add('absent');
                    if (abcNode && !abcNode.classList.contains('correct') && !abcNode.classList.contains('present')) {
                        abcNode.className = 'abc-letter absent';
                    }
                }
            }
            
            if (rightCount === 3) {
                gameOver = true;
                
                // Triggers the CSS class that strikes out the specific word text
                let foundItem = document.getElementById(`wb-${targetWord}`);
                if (foundItem) {
                    foundItem.classList.add('found');
                }

                setTimeout(() => {
                    playWinMelody();
                    document.getElementById('word-reveal').innerText = `You spelled ${targetWord.toUpperCase()}!`;
                    document.getElementById('attempt-counter').innerText = `It took ${totalAttempts} ${totalAttempts === 1 ? 'try' : 'tries'}! ⭐`;
                    document.getElementById('win-emoji').innerText = targetEmoji;
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 400);
                return;
            }
            
            playNote(400, 'square', 0.1, 0.05);
            
            currentRow++;
            currentTile = 0;
            currentGuess = "";
            addNewRow();
        }

        function resetGame() { initGame(); }
        
        setupWordBank();
        initGame();
    </script>
</body>
</html>
