<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werdle 4 Kids! ✨</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #FFF9E6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { color: #FF6B6B; font-size: 2.2rem; text-shadow: 2px 2px #FFD93D; margin: 5px 0; text-align: center; }
        
        /* Layout Ordering */
        .board-container {
            max-height: 35vh;
            overflow-y: auto;
            margin-bottom: 5px;
            padding: 5px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: auto; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tile {
            width: 60px; height: 60px;
            border: 3px solid #4D96FF; border-radius: 12px;
            background-color: white;
            font-size: 2rem; font-weight: bold; color: #333;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        
        .correct { background-color: #6BCB77 !important; color: white; border-color: #55b061; transform: scale(1.05); }
        .present { background-color: #FFD93D !important; color: white; border-color: #e6c230; }
        .absent { background-color: #D3D3D3 !important; color: #777; border-color: #b5b5b5; text-decoration: line-through; }
        
        /* Virtual Keyboard Styles */
        .keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 400px; padding: 5px; margin-bottom: 10px; }
        .kbd-row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        .key {
            flex: 1; padding: 14px 0; background-color: #4D96FF; color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px #3578E5;
            text-align: center; -webkit-tap-highlight-color: transparent;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 2px #3578E5; }
        .wide-key { flex: 1.5; background-color: #FF6B6B; box-shadow: 0 4px #E55353; font-size: 0.9rem; }
        
        /* Alphabet Tracker moved to bottom */
        .abc-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 4px; max-width: 400px; margin-top: 5px;
            background: rgba(255, 255, 255, 0.6); padding: 8px; border-radius: 10px;
        }
        .abc-letter {
            width: 23px; height: 23px; border-radius: 4px;
            background: #FFF; border: 1.5px solid #4D96FF;
            font-size: 0.85rem; font-weight: bold; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; color: #4D96FF;
        }

        /* Celebration Screen */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10;
        }
        .pop-card {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 5px solid #FFD93D; max-width: 80%;
        }
        .pop-card h2 { color: #6BCB77; font-size: 2.5rem; margin: 0 0 10px 0; }
        .pop-card .big-emoji { font-size: 5rem; margin: 15px 0; animation: bounce 0.6s infinite alternate; }
        .btn-next {
            padding: 12px 25px; font-size: 1.3rem; font-weight: bold; background: #FF6B6B;
            color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #E55353;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <h1>✨ Werdle 4 Kids! ✨</h1>
    
    <!-- 1. Attempt boxes -->
    <div class="board-container">
        <div class="grid" id="board"></div>
    </div>

    <!-- 2. Interactive keyboard directly underneath -->
    <div class="keyboard">
        <div class="kbd-row">
            <button class="key" onclick="press('q')">q</button><button class="key" onclick="press('w')">w</button><button class="key" onclick="press('e')">e</button><button class="key" onclick="press('r')">r</button><button class="key" onclick="press('t')">t</button><button class="key" onclick="press('y')">y</button><button class="key" onclick="press('u')">u</button><button class="key" onclick="press('i')">i</button><button class="key" onclick="press('o')">o</button><button class="key" onclick="press('p')">p</button>
        </div>
        <div class="kbd-row">
            <button class="key" onclick="press('a')">a</button><button class="key" onclick="press('s')">s</button><button class="key" onclick="press('d')">d</button><button class="key" onclick="press('f')">f</button><button class="key" onclick="press('g')">g</button><button class="key" onclick="press('h')">h</button><button class="key" onclick="press('j')">j</button><button class="key" onclick="press('k')">k</button><button class="key" onclick="press('l')">l</button>
        </div>
        <div class="kbd-row">
            <button class="key wide-key" onclick="press('ENTER')">GO!</button>
            <button class="key" onclick="press('z')">z</button><button class="key" onclick="press('x')">x</button><button class="key" onclick="press('c')">c</button><button class="key" onclick="press('v')">v</button><button class="key" onclick="press('b')">b</button><button class="key" onclick="press('n')">n</button><button class="key" onclick="press('m')">m</button>
            <button class="key wide-key" onclick="press('BACK')">⌫</button>
        </div>
    </div>

    <!-- 3. Alphabet Tracker moved to bottom row -->
    <div class="abc-container" id="abc-tracker"></div>
    
    <!-- Celebration Overlay -->
    <div id="win-overlay">
        <div class="pop-card">
            <h2>Hooray! 🎉</h2>
            <div id="word-reveal" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 5px;"></div>
            <div id="attempt-counter" style="font-size: 1.2rem; color: #4D96FF; font-weight: bold;"></div>
            <div class="big-emoji" id="win-emoji">🐱</div>
            <button class="btn-next" onclick="resetGame()">Play Again! 🌟</button>
        </div>
    </div>

    <script>
        // Massive list of kid-friendly 3 letter words mapped with perfect emoji pictures
        const WORDS = [
            { word: "cat", emoji: "🐱" }, { word: "dog", emoji: "🐶" }, { word: "sun", emoji: "☀️" }, 
            { word: "pig", emoji: "🐷" }, { word: "fox", emoji: "🦊" }, { word: "hat", emoji: "🎩" },
            { word: "bus", emoji: "🚌" }, { word: "bed", emoji: "🛏️" }, { word: "cup", emoji: "🥤" },
            { word: "car", emoji: "🚗" }, { word: "cow", emoji: "🐮" }, { word: "owl", emoji: "🦉" },
            { word: "bee", emoji: "🐝" }, { word: "box", emoji: "📦" }, { word: "bug", emoji: "🐛" },
            { word: "map", emoji: "🗺️" }, { word: "fly", emoji: "🪰" }, { word: "net", emoji: "🕸️" },
            { word: "fan", emoji: "🪭" }, { word: "ice", emoji: "🧊" }, { word: "bat", emoji: "🦇" },
            { word: "bag", emoji: "🎒" }, { word: "key", emoji: "🔑" }, { word: "jam", emoji: "🍓" },
            { word: "egg", emoji: "🥚" }, { word: "nut", emoji: "🥜" }, { word: "toy", emoji: "🧸" },
            { word: "mop", emoji: "🧹" }, { word: "pin", emoji: "📌" }, { word: "pen", emoji: "🖊️" },
            { word: "lip", emoji: "👄" }, { word: "jet", emoji: "🛩️" }, { word: "rug", emoji: "🪵" },
            { word: "sub", emoji: " submarine 🚢" }, { word: "ant", emoji: "🐜" }, { word: "hen", emoji: "🐔" },
            { word: "log", emoji: "🪵" }, { word: "mug", emoji: "🍺" }, { word: "pot", emoji: "🪴" },
            { word: "web", emoji: "🕸️" }
        ];
        
        let targetWord, targetEmoji, currentRow, currentTile, gameOver;
        let totalAttempts = 0;
        let currentGuess = "";
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        
        // Setup Simple Audio Synthesizer Engine
        let audioCtx = null;
        function playNote(freq, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                // Smooth volume decay to mimic a real bell/instrument
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio not allowed yet"); }
        }

        function playWinMelody() {
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // Beautiful C Major Ascending Arpeggio
            notes.forEach((freq, index) => {
                setTimeout(() => playNote(freq, 'triangle', 0.4), index * 120);
            });
        }

        function initGame() {
            document.getElementById('board').innerHTML = '';
            currentRow = 0;
            currentTile = 0;
            totalAttempts = 0;
            currentGuess = "";
            gameOver = false;
            document.getElementById('win-overlay').style.display = 'none';
            
            let picked = WORDS[Math.floor(Math.random() * WORDS.length)];
            targetWord = picked.word.toLowerCase();
            targetEmoji = picked.emoji;
            
            addNewRow();
            
            const tracker = document.getElementById('abc-tracker');
            tracker.innerHTML = '';
            alphabet.forEach(letter => {
                let node = document.createElement('div');
                node.className = 'abc-letter';
                node.id = `abc-${letter}`;
                node.innerText = letter;
                tracker.appendChild(node);
            });
        }

        function addNewRow() {
            const board = document.getElementById('board');
            let row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${currentRow}`;
            for (let j = 0; j < 3; j++) {
                let tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${currentRow}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
            
            const container = document.querySelector('.board-container');
            container.scrollTop = container.scrollHeight;
        }

        function press(key) {
            if (gameOver) return;
            
            if (key === 'BACK') {
                playNote(220, 'sine', 0.1); // Low tone for delete
                if (currentTile > 0) {
                    currentTile--;
                    currentGuess = currentGuess.slice(0, -1);
                    document.getElementById(`tile-${currentRow}-${currentTile}`).innerText = '';
                }
            } else if (key === 'ENTER') {
                if (currentGuess.length === 3) {
                    checkRow();
                } else {
                    playNote(150, 'sawtooth', 0.15); // Buzz tone if they hit enter too early
                }
            } else if (/^[a-z]$/i.test(key)) {
                if (currentTile < 3) {
                    // Unique bright musical pitch for typing letters (C5, D5, E5 style notes)
                    const letterPitches = [440, 494, 523, 587, 659, 698, 784];
                    let randomPitch = letterPitches[currentTile * 2];
                    playNote(randomPitch, 'triangle', 0.15);
                    
                    currentGuess += key.toLowerCase();
                    document.getElementById(`tile-${currentRow}-${currentTile}`).innerText = key;
                    currentTile++;
                }
            }
        }

        // Add support for Hardware/Manual Keyboards
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                press('ENTER');
            } else if (e.key === 'Backspace') {
                press('BACK');
            } else if (/^[a-zA-Z]$/.test(e.key)) {
                press(e.key.toLowerCase());
            }
        });

        function checkRow() {
            let rightCount = 0;
            totalAttempts++;
            
            for (let i = 0; i < 3; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                let letter = currentGuess[i];
                let abcNode = document.getElementById(`abc-${letter}`);
                
                if (targetWord[i] === letter) {
                    tile.classList.add('correct');
                    if (abcNode) { abcNode.className = 'abc-letter correct'; }
                    rightCount++;
                } else if (targetWord.includes(letter)) {
                    tile.classList.add('present');
                    if (abcNode && !abcNode.classList.contains('correct')) {
                        abcNode.className = 'abc-letter present';
                    }
                } else {
                    tile.classList.add('absent');
                    if (abcNode && !abcNode.classList.contains('correct') && !abcNode.classList.contains('present')) {
                        abcNode.className = 'abc-letter absent';
                    }
                }
            }
            
            if (rightCount === 3) {
                gameOver = true;
                setTimeout(() => {
                    playWinMelody(); // Play cascading win sequence!
                    document.getElementById('word-reveal').innerText = `You spelled ${targetWord.toUpperCase()}!`;
                    document.getElementById('attempt-counter').innerText = `It took ${totalAttempts} ${totalAttempts === 1 ? 'try' : 'tries'}! ⭐`;
                    document.getElementById('win-emoji').innerText = targetEmoji;
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 400);
                return;
            }
            
            // Standard try chime (short ascending tick)
            playNote(400, 'sine', 0.1);
            
            currentRow++;
            currentTile = 0;
            currentGuess = "";
            addNewRow();
        }

        function resetGame() { initGame(); }
        
        initGame();
    </script>
</body>
</html>
